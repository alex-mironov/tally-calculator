name: iOS TestFlight

on:
  push:
    branches: [main]
    paths:
      - "mobile/**" # only build when the app changes
  workflow_dispatch:

# One TestFlight upload at a time — build numbers come from latest_testflight_build_number.
concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: macos-15
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Set up Ruby + bundler (fastlane, cocoapods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: mobile

      - name: Configure SSH for fastlane match
        # Read-only deploy key for the private certs repo (MATCH_GIT_URL is an SSH URL).
        env:
          MATCH_DEPLOY_KEY: ${{ secrets.MATCH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$MATCH_DEPLOY_KEY" > ~/.ssh/match_key
          chmod 600 ~/.ssh/match_key
          cat >> ~/.ssh/config <<'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/match_key
            StrictHostKeyChecking no
          EOF

      - name: Write App Store Connect API key
        # Secret holds the .p8 base64-encoded; decode it to a file fastlane can read.
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: echo "$ASC_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/asc_key.p8"

      - name: Build & upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ runner.temp }}/asc_key.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_OPT_OUT_USAGE: "YES"
          FASTLANE_SKIP_UPDATE_CHECK: "YES"
          FASTLANE_HIDE_TIMESTAMP: "YES"
          FASTLANE_DISABLE_COLORS: "1"
          CI: "true"
        run: bundle exec fastlane ios beta
